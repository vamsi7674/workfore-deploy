# ========================
# PRODUCTION CONFIGURATION
# ========================

spring.application.name=Workforce
server.port=8080

# MySQL Database — connects to Docker Compose 'db' service
# When running in Docker Compose, the hostname is 'db' (the service name)
spring.datasource.url=jdbc:mysql://db:3306/workforce_db?createDatabaseIfNotExist=true&useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:workforce_user}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect
spring.jpa.open-in-view=false

# Connection pool settings
spring.datasource.hikari.maximum-pool-size=10
spring.datasource.hikari.minimum-idle=5
spring.datasource.hikari.connection-timeout=30000

# Timezone Configuration
spring.jpa.properties.hibernate.jdbc.time_zone=Asia/Kolkata
spring.jackson.time-zone=Asia/Kolkata

# CORS — Allowed origins: localhost (dev), EC2 public IP (prod via Nginx on port 80)
# CORS — allow local dev + EC2 backend IP + S3 frontend URL
app.cors.allowed-origins=http://localhost:4200,http://localhost,http://13.201.140.55,http://13.201.140.55:8080,YOUR_S3_WEBSITE_URL

